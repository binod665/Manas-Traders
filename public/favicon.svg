<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B7A3D" />
      <stop offset="100%" stop-color="#054E26" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE082" />
      <stop offset="100%" stop-color="#FFC107" />
    </linearGradient>
  </defs>
  <!-- Rounded Square Background -->
  <rect x="16" y="16" width="480" height="480" rx="110" fill="url(#bgGrad)" />
  <!-- Golden Border Accent -->
  <rect x="28" y="28" width="456" height="456" rx="98" fill="none" stroke="url(#goldGrad)" stroke-width="8" opacity="0.4" />
  
  <!-- Storefront Roof / Canopy -->
  <path d="M120 200 L392 200 L420 240 L92 240 Z" fill="url(#goldGrad)" />
  <path d="M120 200 L160 240 M200 200 L210 240 M280 200 L270 240 M360 200 L330 240" stroke="#054E26" stroke-width="4" opacity="0.3" />
  
  <!-- Store Pillars & Building Body -->
  <rect x="128" y="240" width="256" height="170" rx="12" fill="#FFFFFF" opacity="0.95" />
  
  <!-- Door / Entrance -->
  <rect x="216" y="290" width="80" height="120" rx="8" fill="url(#bgGrad)" />
  
  <!-- Grocery Basket / Shopping Bag Emblem -->
  <path d="M180 180 C180 130, 332 130, 332 180" fill="none" stroke="url(#goldGrad)" stroke-width="24" stroke-linecap="round" />
  
  <!-- Leaf Accent for Fresh Grocery -->
  <path d="M340 120 C380 100, 410 140, 370 170 C330 150, 320 125, 340 120 Z" fill="#4CAF50" />
</svg>
