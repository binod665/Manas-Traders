<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Manas Traders | Tikapur Kailali Nepal</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License https://github.com/rafgraph/spa-github-pages
      // Converts route paths to hash parameters so client-side React Router handles routing correctly
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <div style="text-align: center; margin-top: 50px; font-family: sans-serif; color: #0B7A3D;">
      <h2>Redirecting to Manas Traders...</h2>
      <p>Tikapur, Kailali, Nepal</p>
    </div>
  </body>
</html>
